openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: translate
    description: ASL Topic-Comment Structure translation
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /dictionary:
    post:
      operationId: lookupWord
      tags: [translate]
      summary: Look up a word with ASL example sentences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DictionaryRequest"
      responses:
        "200":
          description: Dictionary entry with ASL examples
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DictionaryResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /translate:
    post:
      operationId: translateToASL
      tags: [translate]
      summary: Translate text to ASL Topic-Comment Structure
      description: Translates English sentences into ASL Topic-Comment Structure format
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TranslateRequest"
      responses:
        "200":
          description: Translated text in ASL Topic-Comment Structure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TranslateResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    DictionaryRequest:
      type: object
      properties:
        word:
          type: string
          description: The word to look up
          minLength: 1
          maxLength: 100
      required:
        - word
    DictionaryExampleSentence:
      type: object
      properties:
        english:
          type: string
          description: The example sentence in English
        topic:
          type: string
          description: The topic portion in ASL gloss
        comment:
          type: string
          description: The comment portion in ASL gloss
        aslStructure:
          type: string
          description: Full ASL gloss in Topic-Comment format
        structureType:
          type: string
          enum: [SVO, OSV, topicalized]
        notes:
          type: string
          description: Grammar note for this sentence
      required:
        - english
        - topic
        - comment
        - aslStructure
        - structureType
        - notes
    DictionaryResponse:
      type: object
      properties:
        word:
          type: string
        partOfSpeech:
          type: string
        definition:
          type: string
        aslSign:
          type: string
          description: How this sign is typically described or represented in ASL
        examples:
          type: array
          items:
            $ref: "#/components/schemas/DictionaryExampleSentence"
      required:
        - word
        - partOfSpeech
        - definition
        - aslSign
        - examples
    TranslateRequest:
      type: object
      properties:
        text:
          type: string
          description: English text to translate
          minLength: 1
          maxLength: 5000
      required:
        - text
    TranslatedSentence:
      type: object
      properties:
        original:
          type: string
          description: Original English sentence
        topic:
          type: string
          description: The topic portion (what is being talked about)
        comment:
          type: string
          description: The comment portion (what is said about the topic)
        aslStructure:
          type: string
          description: Full ASL Topic-Comment structure output
        structureType:
          type: string
          enum: [SVO, OSV, topicalized]
          description: The sentence structure type used
        notes:
          type: string
          description: Grammar notes explaining the structure
      required:
        - original
        - topic
        - comment
        - aslStructure
        - structureType
        - notes
    TranslateResponse:
      type: object
      properties:
        sentences:
          type: array
          items:
            $ref: "#/components/schemas/TranslatedSentence"
        summary:
          type: string
          description: Overall translation summary
      required:
        - sentences
        - summary
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
