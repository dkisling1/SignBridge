kind = "web"
previewPath = "/"
title = "SignBridge"
version = "1.0.0"
id = "artifacts/signbridge"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20611
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/signbridge run dev"

[services.env]
PORT = "20611"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/signbridge", "run", "build"]
publicDir = "artifacts/signbridge/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
